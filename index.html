
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudLibrary | Digital Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans leading-normal tracking-normal">

    <!-- Navigation Header -->
    <nav class="bg-white border-b border-gray-200 fixed w-full z-30 top-0">
        <div class="px-6 py-3 flex items-center justify-between">
            <div class="flex items-center text-indigo-600 font-bold text-2xl">
                <i class="fas fa-book-open mr-3"></i> CloudLibrary
            </div>
            
            <!-- Search Engine Placeholder (Step B) -->
            <div class="flex-1 max-w-xl mx-10">
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                        <i class="fas fa-search"></i>
                    </span>
                    <input type="text" class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md leading-5 bg-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm" placeholder="Search by title, author, or ISBN...">
                </div>
            </div>

            <div class="flex items-center space-x-4">
                <button class="text-gray-600 hover:text-indigo-600"><i class="fas fa-bell"></i></button>
                <div class="h-8 w-8 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold">JD</div>
            </div>
        </div>
    </nav>

    <div class="flex pt-16 overflow-hidden bg-gray-50">
        <!-- Sidebar: Genre Filter -->
        <aside class="fixed z-20 h-full top-0 left-0 pt-16 flex flex-shrink-0 flex-col w-64 transition-width duration-75">
            <div class="relative flex-1 flex flex-col min-h-0 border-r border-gray-200 bg-white pt-0">
                <div class="flex-1 flex flex-col pt-5 pb-4 overflow-y-auto">
                    <div class="flex-1 px-3 space-y-1 bg-white">
                        <p class="px-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Explore Genres</p>
                        <a href="#" class="flex items-center px-3 py-2 text-sm font-medium text-indigo-600 bg-indigo-50 rounded-lg">
                            <i class="fas fa-th-large mr-3"></i> All Books
                        </a>
                        <a href="#" class="flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg">
                            <i class="fas fa-flask mr-3"></i> Science Fiction
                        </a>
                        <a href="#" class="flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg">
                            <i class="fas fa-history mr-3"></i> History
                        </a>
                        <a href="#" class="flex items-center px-3 py-2 text-sm font-medium text-gray-600 hover:bg-gray-50 rounded-lg">
                            <i class="fas fa-brain mr-3"></i> Psychology
                        </a>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content (The Shelf) -->
        <main class="h-full w-full bg-gray-50 relative overflow-y-auto lg:ml-64">
            <div class="pt-6 px-6">
                <div class="flex items-center justify-between mb-6">
                    <h1 class="text-2xl font-bold text-gray-800">New Arrivals</h1>
                    <span class="text-sm text-gray-500">Showing 24 of 1,200 books</span>
                </div>

                <!-- Responsive Grid (Step D) -->
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 mb-10">
                    
                    <!-- Book Card 1 -->
                    <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow duration-300 overflow-hidden group">
                        <div class="relative aspect-[2/3] overflow-hidden">
                            <!-- Lazy Loading Placeholder -->
                            <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?ixlib=rb-1.2.1&auto=format&fit=crop&w=400&q=80" 
                                 alt="Book Cover" class="object-cover w-full h-full group-hover:scale-105 transition-transform duration-300" loading="lazy">
                            <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-20 transition-all duration-300 flex items-center justify-center">
                                <button class="opacity-0 group-hover:opacity-100 bg-indigo-600 text-white px-4 py-2 rounded-full font-semibold shadow-lg">Read Now</button>
                            </div>
                        </div>
                        <div class="p-4">
                            <h3 class="font-bold text-gray-900 truncate">The Art of Code</h3>
                            <p class="text-sm text-gray-500 italic">John Smith</p>
                            <div class="mt-3 flex items-center justify-between">
                                <span class="px-2 py-1 bg-green-100 text-green-700 text-xs font-semibold rounded">Available</span>
                                <span class="text-gray-400 text-xs"><i class="fas fa-star text-yellow-400"></i> 4.8</span>
                            </div>
                        </div>
                    </div>

                    <!-- Repeatable Cards... -->
                    <!-- (Logic would be handled by a Frontend Framework like React to map through DB data) -->
                    
                </div>
            </div>
        </main>
    </div>
</body>
</html>
