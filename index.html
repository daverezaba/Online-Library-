<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Study Companion</title>
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #2d3748;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent: #10b981;
            --accent-hover: #059669;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --border: #e2e8f0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-color); line-height: 1.6; padding: 2rem 1rem; }
        .container { max-width: 1100px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 2rem; }
        header h1 { color: var(--primary); font-size: 2.5rem; margin-bottom: 0.5rem; }
        
        .dashboard { display: grid; grid-template-columns: 1fr; gap: 1.5rem; }
        @media (min-width: 768px) { .dashboard { grid-template-columns: 1fr 1fr; } .full-width { grid-column: span 2; } }

        .card { background: var(--card-bg); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); padding: 1.5rem; border: 1px solid var(--border); }
        .card h2 { font-size: 1.25rem; margin-bottom: 1rem; color: var(--primary); border-bottom: 2px solid var(--border); padding-bottom: 0.5rem; display: flex; justify-content: space-between; align-items: center; }

        input, textarea, select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 1rem; font-size: 0.95rem; background: #f8fafc; }
        button { cursor: pointer; padding: 0.75rem 1.2rem; border: none; border-radius: 6px; font-weight: 600; transition: all 0.2s ease; font-size: 0.95rem; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-danger { background-color: var(--danger); color: white; padding: 0.4rem 0.8rem; font-size: 0.85rem; }

        /* Timer and Lists */
        .timer-display { font-size: 3.5rem; font-weight: bold; text-align: center; margin: 1.5rem 0; font-family: monospace; }
        .task-list { list-style: none; max-height: 280px; overflow-y: auto; }
        .task-item { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem; border-bottom: 1px solid var(--border); gap: 1rem; }
        .task-completed .task-text { text-decoration: line-through; color: #a0aec0; }
        
        /* Flashcards */
        .flashcard-box { width: 100%; max-width: 400px; height: 180px; perspective: 1000px; cursor: pointer; margin: 0 auto; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flipped .flashcard-inner { transform: rotateY(180deg); }
        .flashcard-front, .flashcard-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; padding: 1.5rem; border-radius: 10px; }
        .flashcard-back { background-color: var(--primary); color: white; transform: rotateY(180deg); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>My Study Space</h1>
            <p>Your simple, focused companion for distraction-free learning.</p>
        </header>

        <div class="dashboard">
            <!-- SECTION 1: POMODORO -->
            <div class="card">
                <h2>⏱️ Focus Timer</h2>
                <div class="timer-display" id="timer-display">25:00</div>
                <div class="timer-controls" style="display:flex; justify-content:center; gap: 0.5rem;">
                    <button id="start-btn" class="btn-primary" onclick="toggleTimer()">Start</button>
                    <button class="btn-danger" onclick="resetTimer()">Reset</button>
                </div>
            </div>

            <!-- SECTION 2: TO-DO LIST -->
            <div class="card">
                <h2>📝 Homework & Tasks</h2>
                <input type="text" id="task-input" placeholder="What needs to get done?">
                <button class="btn-primary" style="width: 100%;" onclick="addTask()">Add Task</button>
                <ul class="task-list" id="task-list"></ul>
            </div>

            <!-- SECTION 3: CLASS SCHEDULE (NEW) -->
            <div class="card">
                <h2>📅 Class Schedule</h2>
                <input type="text" id="subj-name" placeholder="Subject Name">
                <input type="time" id="subj-time">
                <button class="btn-primary" style="width: 100%;" onclick="addSchedule()">Add Class</button>
                <ul class="task-list" id="schedule-list"></ul>
            </div>

            <!-- SECTION 4: FLASHCARDS -->
            <div class="card full-width">
                <h2>🗂️ Flashcards</h2>
                <div class="flashcard-box" id="f-box" onclick="this.classList.toggle('flipped')">
                    <div class="flashcard-inner">
                        <div class="flashcard-front" id="f-front" style="border: 2px solid var(--primary);">Click to add cards below</div>
                        <div class="flashcard-back" id="f-back">Answer</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // App State
        let tasks = JSON.parse(localStorage.getItem('student_tasks')) || [];
        let schedule = JSON.parse(localStorage.getItem('student_schedule')) || [];
        
        // --- TIMER LOGIC ---
        let timeLeft = 1500;
        let timerInterval = null;
        function updateTimer() { document.getElementById('timer-display').textContent = `${Math.floor(timeLeft/60)}:${(timeLeft%60).toString().padStart(2, '0')}`; }
        function toggleTimer() {
            if(timerInterval) { clearInterval(timerInterval); timerInterval = null; document.getElementById('start-btn').textContent = "Start"; }
            else { timerInterval = setInterval(() => { timeLeft--; updateTimer(); if(timeLeft<=0) { clearInterval(timerInterval); alert("Time's up!"); } }, 1000); document.getElementById('start-btn').textContent = "Pause"; }
        }
        function resetTimer() { clearInterval(timerInterval); timerInterval = null; timeLeft = 1500; updateTimer(); }

        // --- TASK LOGIC ---
        function addTask() {
            let input = document.getElementById('task-input');
            if(input.value) { tasks.push({text: input.value, done: false}); input.value=''; render(); }
        }
        
        // --- SCHEDULE LOGIC ---
        function addSchedule() {
            let name = document.getElementById('subj-name').value;
            let time = document.getElementById('subj-time').value;
            if(name && time) { 
                schedule.push({name, time, notified: false}); 
                localStorage.setItem('student_schedule', JSON.stringify(schedule));
                render();
            }
        }

        // --- ALARM MONITOR ---
        setInterval(() => {
            const now = new Date();
            const currentTime = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            schedule.forEach(item => {
                if(item.time === currentTime && !item.notified) {
                    alert(`⏰ Time for your class: ${item.name}!`);
                    item.notified = true; // Prevents alert from spamming every second
                }
            });
        }, 30000); // Check every 30 seconds

        // Reset notification flag at midnight
        if(new Date().getMinutes() === 0) schedule.forEach(i => i.notified = false);

        function render() {
            const list = document.getElementById('task-list');
            list.innerHTML = tasks.map((t, i) => `<li class="task-item">${t.text} <button class="btn-danger" onclick="tasks.splice(${i},1); render();">X</button></li>`).join('');
            
            const schedList = document.getElementById('schedule-list');
            schedList.innerHTML = schedule.map((s, i) => `<li class="task-item"><strong>${s.name}</strong> - ${s.time} <button class="btn-danger" onclick="schedule.splice(${i},1); localStorage.setItem('student_schedule', JSON.stringify(schedule)); render();">X</button></li>`).join('');
            
            localStorage.setItem('student_tasks', JSON.stringify(tasks));
        }

        window.onload = render;
    </script>
</body>
</html>
